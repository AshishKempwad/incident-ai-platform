server:
  port: ${SERVER_PORT:8083}
spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:payment_db}
    username: ${DB_USER:payment_app}
    password: ${DB_PASSWORD:payment_secret}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
management:
  endpoints:
    web:
      exposure:
        include: health,info
logging:
  level:
    root: INFO

